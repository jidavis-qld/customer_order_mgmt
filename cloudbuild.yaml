steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - australia-southeast1-docker.pkg.dev/in-demand-87605/cloud-run-source-deploy/orders-inbox
      - --build-arg
      - VITE_BASE_PATH=/orders
      - .

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - australia-southeast1-docker.pkg.dev/in-demand-87605/cloud-run-source-deploy/orders-inbox

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - orders-inbox
      - --image=australia-southeast1-docker.pkg.dev/in-demand-87605/cloud-run-source-deploy/orders-inbox
      - --region=australia-southeast1
      - --project=in-demand-87605
      - --port=8080
      - --ingress=internal-and-cloud-load-balancing
      - --no-allow-unauthenticated
      - --timeout=60s
      - --memory=512Mi
      - --min-instances=1
      - --max-instances=5
      - --service-account=orders-inbox-gmail@in-demand-87605.iam.gserviceaccount.com
      - --set-secrets=GOOGLE_CREDENTIALS_JSON=orders-inbox-google-credentials:latest,ANTHROPIC_API_KEY=orders-inbox-anthropic-key:latest
      - --update-env-vars=DB_PATH=/mnt/db/orders.sqlite
      - --add-volume=name=orders-db,type=cloud-storage,bucket=fablefood-orders-db
      - --add-volume-mount=volume=orders-db,mount-path=/mnt/db

images:
  - australia-southeast1-docker.pkg.dev/in-demand-87605/cloud-run-source-deploy/orders-inbox

options:
  logging: CLOUD_LOGGING_ONLY
